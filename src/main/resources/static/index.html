<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>RAG Service (Qwen)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{background:#0e0f14;color:#e9ecf1;font-family:Inter,system-ui,Arial;margin:0;padding:40px}
    .box{max-width:900px;margin:0 auto}
    input,textarea,button{background:#1a1c24;border:1px solid #2b2f3a;color:#e9ecf1;border-radius:8px;padding:12px;font-size:16px}
    textarea{width:100%;min-height:56px}
    .row{margin:18px 0}
    .btn{background:#6e6ef6;border:none;padding:10px 18px;border-radius:10px;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
    small{opacity:.7}
    .muted{opacity:.7}
    .files{display:flex;gap:12px;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="box">
  <h1>RAG Service (Qwen)</h1>

  <div class="row">
    <label>Question</label>
    <textarea id="q" placeholder="Ask anything..."></textarea>
  </div>

  <div class="row">
    <button class="btn" id="askBtn">Ask</button>
  </div>

  <hr class="row">

  <h3>Upload PDFs (optional)</h3>
  <div class="row files">
    <div>
      <div><small>Choose PDF(s)</small></div>
      <input type="file" id="pdfInput" accept="application/pdf" multiple>
    </div>
    <div>
      <div><small>Choose a Folder of PDFs</small></div>
      <input type="file" id="folderInput" webkitdirectory directory multiple>
    </div>
    <div style="align-self:end">
      <button class="btn" id="ingestBtn">Ingest</button>
    </div>
  </div>

  <div class="row">
    <div id="out" class="muted">Ready.</div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  async function ingest() {
    const filesA = Array.from(($('pdfInput').files || []));
    const filesB = Array.from(($('folderInput').files || []));
    const all = filesA.concat(filesB);
    if (all.length === 0) { $('out').textContent = 'No files selected.'; return; }

    let ok = 0, fail = 0;
    $('out').textContent = `Uploading ${all.length} file(s)...`;

    for (let i = 0; i < all.length; i++) {
      const f = all[i];
      const fd = new FormData();
      fd.append('file', f, f.name);
      fd.append('title', f.name);
      fd.append('tenant', 'default');

      try {
        const rsp = await fetch('/api/ingest', { method: 'POST', body: fd });
        if (rsp.ok) {
          ok++;
          $('out').textContent = `Uploaded ${ok}/${all.length}…`;
        } else {
          fail++;
          const t = await rsp.text();
          console.error('Upload failed:', f.name, t);
          $('out').textContent = `Uploaded ${ok}/${all.length} (failed ${fail})`;
        }
      } catch (e) {
        fail++;
        console.error('Upload error:', f.name, e);
        $('out').textContent = `Uploaded ${ok}/${all.length} (failed ${fail})`;
      }
    }

    $('out').textContent = `Ingest complete: ${ok} succeeded, ${fail} failed.`;
  }

  async function ask() {
    const q = $('q').value.trim();
    if (!q) { $('out').textContent = 'Type a question first.'; return; }

    $('out').textContent = 'Thinking…';

    try {
      const rsp = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, k: 5 })
      });

      if (!rsp.ok) {
        const t = await rsp.text();
        $('out').textContent = 'Error: ' + t;
        return;
      }

      const json = await rsp.json();
      $('out').textContent = json.answer ?? JSON.stringify(json);
    } catch (e) {
      console.error(e);
      $('out').textContent = 'Network error: ' + e.message;
    }
  }

  $('ingestBtn').addEventListener('click', ingest);
  $('askBtn').addEventListener('click', ask);
</script>

</body>
</html>
