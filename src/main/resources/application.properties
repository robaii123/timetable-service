spring.application.name=timetable-service
# Bind to Render's dynamic port (default to 8080 locally)
server.port=${PORT:8080}

# Termination limit for solver
optaplanner.solver.termination.spent-limit=10s

# Expose Actuator endpoints if you want health checks
management.endpoints.web.exposure.include=health,info

# Enable springdoc OpenAPI (Swagger UI)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

