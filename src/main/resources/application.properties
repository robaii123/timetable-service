# ---- Server / Port (Render sets $PORT) ----
server.port=${PORT:8080}

# ---- Chat model on OpenRouter ----
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=qwen/qwen3-30b-a3b-instruct-2507
spring.ai.openai.chat.options.temperature=0.2

spring.ai.openai.connection.headers[HTTP-Referer]=${PUBLIC_URL:https://render.com}
spring.ai.openai.connection.headers[X-Title]=rag-service


spring.ai.openai.embedding.base-url=https://api.openai.com
spring.ai.openai.embedding.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small


logging.level.org.springframework.ai=INFO
logging.level.org.springframework.web.client=INFO


spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}?sslmode=${PGSSLMODE:require}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${PGUSER}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${PGPASSWORD}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false


spring.autoconfigure.exclude=org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration


spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

spring.config.import=optional:file:.env.properties,optional:file:.env[.properties]

